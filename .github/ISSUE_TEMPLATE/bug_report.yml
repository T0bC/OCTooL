name: Bug Report
description: Report a bug or unexpected behavior in OCTooL
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OCTooL Version
      description: Which version of OCTooL are you using? (shown in Settings)
      placeholder: e.g. 2026.7
    validations:
      required: true

  - type: dropdown
    id: windows_version
    attributes:
      label: Windows Version
      description: Which version of Windows are you running OCTooL on?
      options:
        - Windows 10
        - Windows 11
        - Windows Server 2019 / 2022
        - Other
    validations:
      required: true

  - type: input
    id: datetime
    attributes:
      label: Date and Time of Occurrence
      description: |
        When did the bug occur? Please use the format `YYYY-MM-DD HH:MM` with timezone.
        If you are unsure of the exact time, an approximate time is fine.
      placeholder: e.g. 2026-06-04 14:30 (UTC+2)
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem.
    validations:
      required: false
