[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
markers = [
    "unit: Unit tests (no external dependencies)",
    "integration: Integration tests (may require files/resources)",
    "slow: Slow tests (skip with -m 'not slow')",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]

# Coverage policy:
#   The meaningful coverage gate is the pure logic layer. Run it with:
#       pytest tests/ --cov=app.logic --cov-report=term-missing
#   The full picture (includes the tkinter view layer, which only has
#   import-smoke tests) is available with:
#       pytest tests/ --cov=app --cov-report=term-missing
[tool.coverage.run]
source = ["app"]
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
]
