<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" version="1.1">
  <defs>
    <!-- Corporate palette: red #a6192e, dark blue #00677f, blue #0077c8, light blue #05c3dd -->
    <linearGradient id="octRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00677f"/>
      <stop offset="55%" stop-color="#0077c8"/>
      <stop offset="100%" stop-color="#05c3dd"/>
    </linearGradient>
    <linearGradient id="octFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0077c8"/>
      <stop offset="100%" stop-color="#00677f"/>
    </linearGradient>
    <radialGradient id="scanGlow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#05c3dd" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#05c3dd" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Emblem: modern octagon (OCT motif) -->
  <g transform="translate(256 188)">
    <!-- soft glow -->
    <circle cx="0" cy="0" r="150" fill="url(#scanGlow)"/>

    <!-- outer octagon ring -->
    <polygon
      points="-62,-150 62,-150 150,-62 150,62 62,150 -62,150 -150,62 -150,-62"
      fill="none" stroke="url(#octRing)" stroke-width="20" stroke-linejoin="round"/>

    <!-- inner octagon -->
    <polygon
      points="-40,-97 40,-97 97,-40 97,40 40,97 -40,97 -97,40 -97,-40"
      fill="url(#octFill)" fill-opacity="0.08"
      stroke="#0077c8" stroke-width="6" stroke-linejoin="round"/>

    <!-- OCT cross-section / B-scan lines (light blue) -->
    <g stroke="#05c3dd" stroke-width="7" stroke-linecap="round" fill="none">
      <path d="M -78 -22 Q -39 -54 0 -30 Q 39 -6 78 -34"/>
      <path d="M -78 14 Q -39 -18 0 6 Q 39 30 78 2" stroke-opacity="0.85"/>
      <path d="M -78 50 Q -39 18 0 42 Q 39 66 78 38" stroke-opacity="0.6"/>
    </g>

    <!-- accent vertices (red corporate accent) -->
    <g fill="#a6192e">
      <circle cx="0" cy="-150" r="11"/>
      <circle cx="150" cy="0" r="11"/>
      <circle cx="0" cy="150" r="11"/>
      <circle cx="-150" cy="0" r="11"/>
    </g>
  </g>

  <!-- Wordmark: OCTooL -->
  <g text-anchor="middle" font-family="'Segoe UI', 'Futura', 'Helvetica Neue', Arial, sans-serif">
    <text x="256" y="420" font-size="92" font-weight="700" letter-spacing="2">
      <tspan fill="#00677f">OCT</tspan><tspan fill="#0077c8">oo</tspan><tspan fill="#a6192e">L</tspan>
    </text>
    <text x="256" y="462" font-size="26" font-weight="400" letter-spacing="8" fill="#05c3dd">
      OCT ANALYSIS TOOL
    </text>
  </g>
</svg>
